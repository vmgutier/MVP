<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse - Mental Health Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
    }
    
    .mood-button {
      transition: all 0.3s ease;
    }
    
    .mood-button:hover {
      transform: scale(1.08);
    }
    
    .mood-button.selected {
      box-shadow: 0 0 0 3px rgba(167, 243, 208, 0.5);
    }
    
    .bottom-nav-button {
      transition: all 0.2s ease;
    }
    
    .bottom-nav-button.active {
      color: rgb(16, 185, 129);
    }
    
    .bottom-nav-button.inactive {
      color: rgb(156, 163, 175);
    }
    
    .task-item {
      transition: all 0.3s ease;
    }
    
    .task-item.completed {
      text-decoration: line-through;
    }
    
    .checkbox {
      transition: all 0.2s ease;
    }
  </style>
</head>
<body class="bg-stone-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function Pulse() {
      const [currentTab, setCurrentTab] = useState('checkin');
      const [selectedMood, setSelectedMood] = useState(null);
      const [reflection, setReflection] = useState('');
      const [showSuccess, setShowSuccess] = useState(false);
      const [userName] = useState('Alex');
      const [agendaItems, setAgendaItems] = useState([]);
      const [agendaInput, setAgendaInput] = useState('');
      const [shareMoodTrends, setShareMoodTrends] = useState(false);

      const moods = [
        { id: 'great', label: 'Great', emoji: '😄', color: 'bg-emerald-100' },
        { id: 'good', label: 'Good', emoji: '🙂', color: 'bg-green-100' },
        { id: 'okay', label: 'Okay', emoji: '😐', color: 'bg-blue-100' },
        { id: 'struggling', label: 'Struggling', emoji: '😟', color: 'bg-yellow-100' },
        { id: 'hard', label: 'Hard Day', emoji: '😔', color: 'bg-orange-100' }
      ];

      const addAgendaItem = () => {
        if (agendaInput.trim()) {
          setAgendaItems([...agendaItems, { id: Date.now(), text: agendaInput, completed: false }]);
          setAgendaInput('');
        }
      };

      const toggleAgendaItem = (id) => {
        setAgendaItems(agendaItems.map(item =>
          item.id === id ? { ...item, completed: !item.completed } : item
        ));
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter') {
          addAgendaItem();
        }
      };

      const handleSubmit = () => {
        if (selectedMood) {
          setShowSuccess(true);
          setTimeout(() => {
            setShowSuccess(false);
            setSelectedMood(null);
            setReflection('');
          }, 3000);
        }
      };

      const handleTabChange = (tab) => {
        if (tab !== 'checkin') {
          setCurrentTab(tab);
        } else {
          setShowSuccess(false);
          setCurrentTab(tab);
        }
      };

      return (
        <div className="flex flex-col h-screen bg-stone-50 overflow-hidden">
          {/* Main Content */}
          <div className="flex-1 overflow-y-auto pb-24">
            {/* Check-in Screen */}
            {currentTab === 'checkin' && (
              <div className="px-6 py-8">
                {/* Header */}
                <div className="mb-12 text-center">
                  <h1 className="text-3xl font-semibold text-gray-800 mb-2">
                    How are you feeling today, <span className="text-emerald-600">{userName}</span>?
                  </h1>
                  <p className="text-gray-500 text-sm">Your check-in helps us support you better</p>
                </div>

                {/* Success Card */}
                {showSuccess && (
                  <div className="mb-8 p-6 bg-gradient-to-br from-emerald-50 to-green-50 rounded-2xl border border-emerald-200">
                    <div className="text-center">
                      <div className="text-4xl mb-3">✓</div>
                      <h2 className="text-xl font-semibold text-emerald-700 mb-2">Report Shared</h2>
                      <p className="text-emerald-600 text-sm">Your counselor has been notified and will reach out soon.</p>
                    </div>
                  </div>
                )}

                {/* Form Content */}
                {!showSuccess && (
                  <>
                    {/* Mood Selector */}
                    <div className="mb-10">
                      <label className="block text-sm font-medium text-gray-700 mb-4">Select your mood</label>
                      <div className="grid grid-cols-5 gap-3">
                        {moods.map((mood) => (
                          <button
                            key={mood.id}
                            onClick={() => setSelectedMood(mood.id)}
                            className={`mood-button flex flex-col items-center justify-center p-6 rounded-2xl transition-all ${
                              selectedMood === mood.id
                                ? `${mood.color} ring-2 ring-emerald-400 scale-105`
                                : 'bg-gray-100 hover:bg-gray-200'
                            }`}
                          >
                            <span className="text-3xl mb-1">{mood.emoji}</span>
                            <span className="text-xs font-medium text-gray-700 text-center leading-tight">{mood.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Reflection Box */}
                    <div className="mb-8">
                      <label className="block text-sm font-medium text-gray-700 mb-3">Your thoughts</label>
                      <textarea
                        value={reflection}
                        onChange={(e) => setReflection(e.target.value)}
                        placeholder="What's on your mind? (Optional)"
                        className="w-full p-4 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent resize-none placeholder-gray-400 text-gray-700"
                        rows="5"
                      />
                    </div>

                    {/* Submit Button */}
                    <button
                      onClick={handleSubmit}
                      disabled={!selectedMood}
                      className={`w-full py-3 rounded-2xl font-semibold transition-all ${
                        selectedMood
                          ? 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-md hover:shadow-lg'
                          : 'bg-gray-200 text-gray-500 cursor-not-allowed'
                      }`}
                    >
                      Submit Check-in
                    </button>
                  </>
                )}
              </div>
            )}

            {/* Agenda Screen - Clear Your Mind */}
            {currentTab === 'agenda' && (
              <div className="px-6 py-8">
                {/* Header */}
                <div className="mb-8 text-center">
                  <h1 className="text-3xl font-semibold text-gray-800 mb-2">
                    Clear Your Mind
                  </h1>
                  <p className="text-gray-500 text-sm">Organize your thoughts and tasks</p>
                </div>

                {/* Input Section */}
                <div className="mb-8">
                  <div className="flex gap-2">
                    <input
                      type="text"
                      value={agendaInput}
                      onChange={(e) => setAgendaInput(e.target.value)}
                      onKeyPress={handleKeyPress}
                      placeholder="Add a task or thought..."
                      className="flex-1 px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent placeholder-gray-400 text-gray-700"
                    />
                    <button
                      onClick={addAgendaItem}
                      className="w-12 h-12 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl flex items-center justify-center font-semibold transition-all shadow-md hover:shadow-lg"
                    >
                      +
                    </button>
                  </div>
                </div>

                {/* Tasks List */}
                {agendaItems.length === 0 ? (
                  <div className="text-center py-12">
                    <div className="text-5xl mb-4">📝</div>
                    <p className="text-gray-500">No tasks yet. Add one to get started!</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {agendaItems.map((item) => (
                      <div
                        key={item.id}
                        className="flex items-center gap-4 p-4 bg-white rounded-2xl shadow-sm hover:shadow-md transition-all border border-gray-100"
                      >
                        <button
                          onClick={() => toggleAgendaItem(item.id)}
                          className={`checkbox flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${
                            item.completed
                              ? 'bg-emerald-500 border-emerald-500'
                              : 'border-gray-300 hover:border-emerald-400'
                          }`}
                        >
                          {item.completed && (
                            <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                            </svg>
                          )}
                        </button>
                        <span
                          className={`task-item flex-1 text-gray-800 ${
                            item.completed ? 'completed text-gray-400' : ''
                          }`}
                        >
                          {item.text}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Counselor Screen - Counselor Connect */}
            {currentTab === 'counselor' && (
              <div className="px-6 py-8">
                {/* Header */}
                <div className="mb-8 text-center">
                  <h1 className="text-3xl font-semibold text-gray-800 mb-2">
                    Counselor Connect
                  </h1>
                  <p className="text-gray-500 text-sm">Reach out to your support team</p>
                </div>

                {/* Counselor Profile Card */}
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8">
                  <div className="flex items-center mb-6">
                    <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mr-4">
                      <span className="text-2xl">👩‍⚕️</span>
                    </div>
                    <div>
                      <h3 className="text-xl font-semibold text-gray-800">Dr. Jordan</h3>
                      <p className="text-gray-500 text-sm">Athletic Counselor</p>
                    </div>
                  </div>

                  <div className="flex gap-3">
                    <button className="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-2xl font-semibold transition-all shadow-md hover:shadow-lg">
                      Message
                    </button>
                    <button className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-2xl font-semibold transition-all">
                      Schedule
                    </button>
                  </div>
                </div>

                {/* Privacy & Data Section */}
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8">
                  <h3 className="text-lg font-semibold text-gray-800 mb-4">Privacy & Data</h3>

                  <div className="flex items-center justify-between">
                    <div className="flex-1">
                      <p className="text-gray-700 text-sm">Automatically share my mood trends with my counselor</p>
                    </div>
                    <button
                      onClick={() => setShareMoodTrends(!shareMoodTrends)}
                      className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${
                        shareMoodTrends ? 'bg-emerald-500' : 'bg-gray-200'
                      }`}
                    >
                      <span
                        className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${
                          shareMoodTrends ? 'translate-x-6' : 'translate-x-1'
                        }`}
                      />
                    </button>
                  </div>
                </div>

                {/* Footer Note */}
                <div className="text-center">
                  <p className="text-gray-500 text-sm leading-relaxed">
                    Pulse is a safe space. Your data is only shared with your assigned counselor.
                  </p>
                </div>
              </div>
            )}
          </div>

          {/* Bottom Navigation Bar */}
          <div className="fixed bottom-0 left-0 right-0 bg-stone-50 border-t border-gray-100 shadow-lg">
            <div className="flex justify-around items-center h-20 max-w-md mx-auto w-full px-4">
              <button
                onClick={() => handleTabChange('checkin')}
                className={`bottom-nav-button flex flex-col items-center justify-center w-16 h-16 rounded-xl transition-all ${
                  currentTab === 'checkin'
                    ? 'bg-emerald-50'
                    : 'hover:bg-gray-50'
                }`}
              >
                <span className="text-2xl mb-1">💚</span>
                <span className={`text-xs font-medium ${currentTab === 'checkin' ? 'text-emerald-600' : 'text-gray-600'}`}>
                  Check-in
                </span>
              </button>

              <button
                onClick={() => handleTabChange('agenda')}
                className={`bottom-nav-button flex flex-col items-center justify-center w-16 h-16 rounded-xl transition-all ${
                  currentTab === 'agenda'
                    ? 'bg-emerald-50'
                    : 'hover:bg-gray-50'
                }`}
              >
                <span className="text-2xl mb-1">📅</span>
                <span className={`text-xs font-medium ${currentTab === 'agenda' ? 'text-emerald-600' : 'text-gray-600'}`}>
                  Agenda
                </span>
              </button>

              <button
                onClick={() => handleTabChange('counselor')}
                className={`bottom-nav-button flex flex-col items-center justify-center w-16 h-16 rounded-xl transition-all ${
                  currentTab === 'counselor'
                    ? 'bg-emerald-50'
                    : 'hover:bg-gray-50'
                }`}
              >
                <span className="text-2xl mb-1">💬</span>
                <span className={`text-xs font-medium ${currentTab === 'counselor' ? 'text-emerald-600' : 'text-gray-600'}`}>
                  Counselor
                </span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<Pulse />, document.getElementById('root'));
  </script>
</body>
</html>
